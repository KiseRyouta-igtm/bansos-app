<!DOCTYPE html>
<html>
<head>
    <title>Bansos App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-primary">Dashboard Bantuan Sosial</h2>

<!-- INFO USER -->
<p class="text-muted">
    Login sebagai: <b>{{ session['username'] }}</b> ({{ role }})
</p>

<div class="mb-3">
    <a href="/tambah" class="btn btn-primary">Tambah Data</a>
    <a href="/laporan" class="btn btn-info">Laporan</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<!-- SEARCH -->
<form method="GET" class="mb-3">
    <input type="text" name="q" placeholder="Cari nama / NIK..." class="form-control">
</form>

<!-- Statistik -->
<div class="card p-3 mb-3">
    <h5>Total Data: {{ data|length }}</h5>
</div>

<table class="table table-bordered table-striped">
    <tr class="table-dark">
        <th>Nama</th>
        <th>NIK</th>
        <th>Alamat</th>
        <th>Jenisgit add .
