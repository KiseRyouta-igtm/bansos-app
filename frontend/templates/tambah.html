<!DOCTYPE html>
<html>
<head>
    <title>Tambah Data Penerima Bantuan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-primary mb-4">Tambah Data Penerima Bantuan Sosial</h2>

<form method="POST" enctype="multipart/form-data">

    <label class="form-label">Nama Lengkap</label>
    <input type="text"
           name="nama"
           class="form-control mb-3"
           placeholder="Masukkan nama lengkap"
           required>

    <label class="form-label">Usia</label>
    <input type="number"
           name="usia"
           class="form-control mb-3"
           min="1"
           max="120"
           placeholder="Masukkan usia"
           required>

    <label class="form-label">NIK</label>
    <input type="text"
           name="nik"
           maxlength="16"
           minlength="16"
           pattern="[0-9]{16}"
           class="form-control mb-3"
           placeholder="16 digit NIK"
           required>

    <label class="form-label">Alamat</label>
    <textarea
        name="alamat"
        class="form-control mb-3"
        rows="3"
        placeholder="Masukkan alamat lengkap"
        required></textarea>

    <label class="form-label">Jenis Bantuan</label>
    <select name="jenis" class="form-control mb-3" required>
        <option value="">-- Pilih Bantuan --</option>
        <option value="BLT">BLT</option>
        <option value="Sembako">Sembako</option>
        <option value="PKH">PKH</option>
    </select>

    <label class="form-label">Pendapatan per Bulan (Rp)</label>
    <input type="number"
           name="pendapatan"
           class="form-control mb-3"
           min="0"
           placeholder="Contoh: 1500000"
           required>

    <label class="form-label">Pekerjaan</label>
    <select name="pekerjaan" class="form-control mb-3" required>
        <option value="">-- Pilih Pekerjaan --</option>
        <option>buruh tani</option>
        <option>petani kecil</option>
        <option>buruh harian lapas</option>
        <option>nelayan tradisional</option>
        <option>pedagang kecil/kaki lima</option>
        <option>tukang bangunan harian</option>
        <option>karyawan gaji dibawah upah minimum pekerja</option>
        <option>pekerja informal</option>
        <option>asisten rumah tangga</option>
        <option>pengangguran</option>
        <option>lansia tidak bekerja</option>
    </select>

    <label class="form-label">Upload Foto KTP</label>
    <input type="file"
           name="foto_ktp"
           class="form-control mb-3"
           accept=".jpg,.jpeg,.png"
           required>

    <label class="form-label">Upload Foto Rumah</label>
    <input type="file"
           name="foto_rumah"
           class="form-control mb-4"
           accept=".jpg,.jpeg,.png"
           required>

    <button type="submit" class="btn btn-primary">
        Simpan Data
    </button>

    <a href="/" class="btn btn-secondary">
        Kembali
    </a>

</form>

</body>
</html>
